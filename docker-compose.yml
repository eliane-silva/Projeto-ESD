services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mock_youtube:
    build: ./services/mock_youtube
    env_file:
      - .env.docker
    ports:
      - "8001:8000"
    command: python -u -m uvicorn app:app --host 0.0.0.0 --port 8000

  mock_instagram:
    build: ./services/mock_instagram
    env_file:
      - .env.docker
    ports:
      - "8002:8000"
    command: python -u -m uvicorn app:app --host 0.0.0.0 --port 8000

  scheduler:
    build: ./services/scheduler
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    depends_on:
      - redis
      - mock_youtube
      - mock_instagram
    command: python -u -m uvicorn scheduler:app --host 0.0.0.0 --port 8000

  worker:
    build: ./services/worker
    env_file:
      - .env.docker
    depends_on:
      - redis
      - scheduler
      - mock_youtube
      - mock_instagram
      - monitoring
    command: python -u worker.py

  monitoring:
    build: ./services/monitoring
    ports:
      - "8003:8000"
    env_file:
      - .env.docker

  frontend:
    build: ./services/frontend
    ports:
      - "5173:80"
    depends_on:
      - scheduler
      - mock_youtube
      - mock_instagram
      - monitoring