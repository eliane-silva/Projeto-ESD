services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  fake_youtube:
    build: ./services/fake_youtube
    ports:
      - "8001:8001"
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    command: python -m uvicorn app:app --host 0.0.0.0 --port 8001 --reload

  fake_instagram:
    build: ./services/fake_instagram
    ports:
      - "8002:8002"
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    command: python -m uvicorn app:app --host 0.0.0.0 --port 8002 --reload

  scheduler:
    build: ./services/scheduler
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    command: python -m uvicorn scheduler:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: ./services/worker
    environment:
      - REDIS_URL=redis://redis:6379/0
      - YOUTUBE_URL=http://fake_youtube:8001/api/youtube/like
      - INSTAGRAM_URL=http://fake_instagram:8002/api/instagram/like
    depends_on:
      - redis
      - fake_youtube
      - fake_instagram
    command: python -u worker.py